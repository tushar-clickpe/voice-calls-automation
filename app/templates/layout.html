<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campaign Manager{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">Campaign Manager</a>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/campaigns" class="{% if active_page == 'campaigns' %}active{% endif %}">Campaigns</a>
            <a href="/campaigns/new" class="btn btn-sm btn-primary">+ New Campaign</a>
        </div>
    </nav>

    <main class="container">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
